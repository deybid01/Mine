<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
    overflow:hidden;

}

.container{

    text-align:center;
    color:white;
    z-index:10;

}

.container h1{

    font-size:60px;
    margin-bottom:20px;
    text-shadow:0 5px 15px rgba(0,0,0,.25);

}

.container p{

    font-size:22px;
    margin-bottom:40px;

}

.start{

    display:inline-block;
    padding:18px 50px;
    border-radius:50px;
    background:white;
    color:#ff4d79;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    transition:.3s;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.start:hover{

    transform:scale(1.08);

}

.heart{

    position:absolute;
    bottom:-50px;
    color:white;
    animation:float linear infinite;

}

@keyframes float{

0%{

transform:translateY(0) scale(.5);
opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-110vh) scale(1.5);
opacity:0;

}

}

@media(max-width:768px){

.container h1{

font-size:40px;

}

.container p{

font-size:18px;

}

.start{

font-size:18px;
padding:15px 35px;

}

}

</style>

</head>
<body>

<div class="container">

<h1>❤️ Welcome ❤️</h1>

<p>
I made something special just for you.<br>
Click the button below to begin.
</p>

<a href="main.html" class="start">
🌹 Start Our Journey
</a>

</div>

<script>

function createHeart(){

    const heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(20+Math.random()*35)+"px";

    heart.style.animationDuration=(5+Math.random()*5)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
